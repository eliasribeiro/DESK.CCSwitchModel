    <script>
      const { useEffect, useMemo, useState, useRef } = React

      // Lucide Icon via CDN (sem toSvg)
      const Icon = ({ name, size = 18, className = "", theme }) => {
        const iconRef = useRef(null)
        useEffect(() => {
          if (window.lucide) {
            lucide.createIcons()
          }
        }, [name, size, className, theme])
        return React.createElement('i', { 
          ref: iconRef, 
          'data-lucide': name, 
          className: `inline-flex shrink-0 ${className}`, 
          style: { width: size, height: size }
        })
      }

      function useTheme() {
        const initial = (() => {
          const saved = localStorage.getItem('ccswitch-theme')
          if (saved === 'dark' || saved === 'light') return saved
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        })()
        const [theme, setTheme] = useState(initial)
        useEffect(() => {
          const el = document.documentElement
          if (theme === 'dark') {
            el.classList.add('dark')
            document.body.classList.add('dark')
          } else {
            el.classList.remove('dark')
            document.body.classList.remove('dark')
          }
          localStorage.setItem('ccswitch-theme', theme)
          // Forçar re-render dos ícones
          window.dispatchEvent(new Event('theme-change'));
        }, [theme])
        return { theme, setTheme }
      }

      function App() {
        const { theme, setTheme } = useTheme()
        const [rootPath, setRootPath] = useState('')
        const [cliType, setCliType] = useState('claude-code')
        const [provider, setProvider] = useState('')
        const [modelName, setModelName] = useState('')
        const [apiKey, setApiKey] = useState('')
        const [status, setStatus] = useState(null)
        const [saving, setSaving] = useState(false)
        const isMac = /Mac|Macintosh/.test(navigator.userAgent)
        const [hasApiKey, setHasApiKey] = useState(false)
        const [availableModels, setAvailableModels] = useState([])
        const [modelsLoading, setModelsLoading] = useState(false)
        const [modelsError, setModelsError] = useState(null)
        const [modelFilter, setModelFilter] = useState('')
        const modelsSearchTimer = useRef(null)

        // Efeito para carregar modelos do provedor quando API Key é fornecida
        useEffect(() => {
          if (modelsSearchTimer.current) {
            clearTimeout(modelsSearchTimer.current)
            modelsSearchTimer.current = null
          }
          setModelsError(null)
          
          // Provedores que suportam listagem dinâmica de modelos
          const providersWithApi = ['zai', 'openrouter', 'piramyd']
          
          if (!provider || !hasApiKey || !providersWithApi.includes(provider)) {
            setAvailableModels([])
            setModelsLoading(false)
            return () => {}
          }

          modelsSearchTimer.current = setTimeout(async () => {
            setModelsLoading(true)
            try {
              let url, headers
              
              if (provider === 'zai') {
                url = 'https://api.z.ai/api/paas/v4/models'
                headers = { Authorization: `Bearer ${apiKey.trim()}` }
              } else if (provider === 'piramyd') {
                url = 'https://api.piramyd.cloud/v1/models'
                headers = { Authorization: `Bearer ${apiKey.trim()}` }
              } else if (provider === 'openrouter') {
                url = 'https://openrouter.ai/api/v1/models'
                headers = { Authorization: `Bearer ${apiKey.trim()}` }
              }
              
              const resp = await fetch(url, { headers })
              if (!resp.ok) throw new Error(`HTTP ${resp.status}`)
              const json = await resp.json()
              
              let models = []
              if (provider === 'zai' || provider === 'piramyd') {
                models = Array.isArray(json?.data) ? json.data.map(m => m.id) : []
              } else if (provider === 'openrouter') {
                models = Array.isArray(json?.data) ? json.data.map(m => m.id) : []
              }
              
              setAvailableModels(models)
            } catch (e) {
              setModelsError('Falha ao carregar modelos')
              setAvailableModels([])
            } finally {
              setModelsLoading(false)
            }
          }, 300)
          
          return () => {
            if (modelsSearchTimer.current) {
              clearTimeout(modelsSearchTimer.current)
              modelsSearchTimer.current = null
            }
          }
        }, [provider, hasApiKey, apiKey])

        const persistApiKey = async () => {
          if (apiKey && apiKey.trim().length > 0) {
            await window.ccswitch.setCredential({ provider, apiKey })
          }
        }

        const jsonPreview = useMemo(() => {
          if (cliType === 'opencode' || cliType === 'opencode-go') {
            const base = {
              $schema: 'https://opencode.ai/config.json',
              model: `${provider}/${modelName || 'modelo'}`
            }
            
            // Para Piramyd, mostrar configuração completa com modelos
            if (provider === 'piramyd' && availableModels && availableModels.length > 0) {
              base.provider = {
                piramyd: {
                  npm: '@ai-sdk/openai-compatible',
                  name: 'Piramyd Cloud',
                  options: {
                    baseURL: 'https://api.piramyd.cloud/v1',
                    apiKey: apiKey ? "••••••••••••••••" : "",
                    headers: {
                      Authorization: apiKey ? "Bearer ••••••••••••••••" : ""
                    }
                  },
                  models: {}
                }
              }
              availableModels.forEach(modelId => {
                base.provider.piramyd.models[modelId] = {
                  name: modelId
                }
              })
            }
            
            return JSON.stringify(base, null, 2)
          }
          
          // Preview para Claude Code
          const getBaseUrl = () => {
            switch (provider) {
              case 'minimax': return "https://api.minimax.io/anthropic"
              case 'openrouter': return "https://openrouter.ai/api"
              case 'kimi': return "https://api.moonshot.ai/anthropic"
              case 'alibaba': return "https://coding-intl.dashscope.aliyuncs.com/apps/anthropic"
              case 'piramyd': return "https://api.piramyd.cloud/v1"
              case 'cerebras': return "https://api.cerebras.ai/v1"
              default: return "https://api.z.ai/api/anthropic"
            }
          }
          const getDefaultModel = () => {
            switch (provider) {
              case 'minimax': return 'MiniMax-M2.1'
              case 'kimi': return 'kimi-k2.5'
              case 'alibaba': return 'qwen3.5-plus'
              case 'piramyd': return 'gpt-5.2-pro'
              case 'cerebras': return 'glm-4.7'
              default: return 'glm-4.7'
            }
          }
          const getTimeoutMs = () => {
            return provider === 'kimi' ? "600000" : "3000000"
          }
          const base = {
            env: {
              ANTHROPIC_BASE_URL: getBaseUrl(),
              ANTHROPIC_AUTH_TOKEN: apiKey ? "••••••••••••••••" : "",
              API_TIMEOUT_MS: getTimeoutMs()
            }
          }
          if (provider === 'minimax' || provider === 'kimi') {
            base.env.CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC = "1"
          }
          if (provider === 'openrouter') {
            base.env.ANTHROPIC_API_KEY = ""
          }
          if (provider === 'piramyd') {
            base.env.OPENAI_BASE_URL = "https://api.piramyd.cloud/v1"
            base.env.OPENAI_API_KEY = apiKey ? "••••••••••••••••" : ""
            delete base.env.ANTHROPIC_BASE_URL
            delete base.env.ANTHROPIC_AUTH_TOKEN
          }
          const models = ["ANTHROPIC_MODEL", "ANTHROPIC_SMALL_FAST_MODEL", "ANTHROPIC_DEFAULT_SONNET_MODEL", "ANTHROPIC_DEFAULT_OPUS_MODEL", "ANTHROPIC_DEFAULT_HAIKU_MODEL"]
          models.forEach(m => base.env[m] = modelName || getDefaultModel())

          return JSON.stringify(base, null, 2)
        }, [cliType, provider, modelName, apiKey, availableModels])

        const onPickRoot = async () => {
          const p = await window.ccswitch.selectRoot()
          if (p) setRootPath(p)
        }

        const onSave = async () => {
          setSaving(true); setStatus(null)
          await persistApiKey()
          let targetRoot = rootPath
          if (!targetRoot) {
            const picked = await window.ccswitch.selectRoot()
            if (!picked) {
              setSaving(false);
              setStatus({ ok: false, error: 'Selecione uma pasta válida para salvar.' });
              return
            }
            setRootPath(picked)
            targetRoot = picked
          }
          const res = await window.ccswitch.saveSettings({ rootPath: targetRoot, cliType, provider, modelName, apiKey, availableModels })
          setSaving(false); setStatus(res)
        }

        const openProjectFolder = () => {
          if (rootPath) {
            // Usaremos uma função exposa no preload para abrir a pasta
            window.ccswitch.openPath(rootPath)
          }
        }

        return React.createElement('div', { className: 'min-h-screen pb-12' }, [

          },

              React.createElement('div', { className: 'flex items-center gap-2' }, [
                React.createElement('div', { className: 'w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold' }, 'C'),
                React.createElement('span', { className: 'font-semibold text-lg tracking-tight' }, 'Claude Code Switcher')
              ]),
              React.createElement('button', { 
                onClick: () => {
                  const newTheme = theme === 'dark' ? 'light' : 'dark';
                  setTheme(newTheme);
                },
                className: 'p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all text-zinc-500 dark:text-zinc-400',
                style: { WebkitAppRegion: 'no-drag' }
              }, React.createElement(Icon, { name: theme === 'dark' ? 'sun' : 'moon', theme }))
            ])
          ),

          React.createElement('main', { className: 'max-w-7xl mx-auto px-4 sm:px-6 mt-6 lg:mt-8 grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8' }, [
            // Left Column: Form
            React.createElement('div', { className: 'lg:col-span-7 space-y-6' }, [
              // Project Selection
              React.createElement('div', { className: 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-sm' }, [
                React.createElement('h2', { className: 'text-sm font-semibold uppercase tracking-wider text-zinc-500 mb-4 flex items-center gap-2' }, [
                  React.createElement(Icon, { name: 'folder-open', size: 14, theme }), 'Projeto'
                ]),
                React.createElement('div', { className: 'flex flex-col gap-3' }, [
                  React.createElement('button', {
                    onClick: onPickRoot,
                    className: 'flex items-center justify-center gap-2 w-full py-3 px-4 rounded-xl border-2 border-dashed border-zinc-200 dark:border-zinc-800 hover:border-blue-500 dark:hover:border-blue-500 hover:bg-blue-50/50 dark:hover:bg-blue-500/5 transition-all group'
                  }, [
                    React.createElement(Icon, { name: 'plus', className: 'text-zinc-400 group-hover:text-blue-500', theme }),
                    React.createElement('span', { className: 'text-zinc-600 dark:text-zinc-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 font-medium' }, 
                      rootPath ? 'Alterar pasta do projeto' : 'Selecionar pasta raiz do projeto'
                    )
                  ]),
                  rootPath && React.createElement('div', { className: 'flex items-center gap-2 px-3 py-2 bg-zinc-50 dark:bg-zinc-950 rounded-lg border border-zinc-200 dark:border-zinc-800' }, [
                    React.createElement(Icon, { name: 'check-circle-2', size: 16, className: 'text-green-500', theme }),
                    React.createElement('span', { className: 'text-xs font-mono text-zinc-500 truncate' }, rootPath)
                  ])
                ])
              ]),

              // Configuration
              React.createElement('div', { className: 'bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-sm space-y-6' }, [

                ]),

                // 1. CLI Type Selection
                React.createElement('div', null, [
                  React.createElement('label', { className: 'block text-xs font-medium text-zinc-500 mb-2' }, '1. TERMINAL'),
                  React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-3' }, [
                    { id: 'claude-code', label: 'Claude Code', icon: 'Terminal', description: 'Anthropic Claude Code' },
                    { id: 'opencode', label: 'OpenCode', icon: 'Code', description: 'OpenCode CLI (Node.js)' },
                    { id: 'opencode-go', label: 'OpenCode Go', icon: 'Box', description: 'OpenCode CLI (Go)' }
                  ].map(cli => React.createElement('button', {
                    key: cli.id,
                    onClick: () => {
                      setCliType(cli.id);
                      setProvider('');
                      setModelName('');
                      setApiKey('');
                      setHasApiKey(false);
                    },
                    className: `flex flex-col items-start gap-1 px-4 py-3 rounded-xl border-2 transition-all ${cliType === cli.id
                      ? 'border-blue-500 bg-blue-50/50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400'
                      : 'border-zinc-100 dark:border-zinc-800 hover:border-zinc-200 dark:hover:border-zinc-700'}`
                  }, [
                    React.createElement('div', { className: 'flex items-center gap-2' }, [
                      React.createElement(Icon, { name: cli.icon.toLowerCase(), size: 18, theme }),
                      React.createElement('span', { className: 'font-medium' }, cli.label)
                    ]),
                    React.createElement('span', { className: 'text-[10px] opacity-70' }, cli.description)
                  ])))
                ]),

                // 2. Provider
                React.createElement('div', null, [
                  React.createElement('label', { className: 'block text-xs font-medium text-zinc-500 mb-2' }, '2. PROVEDOR'),
                  React.createElement('div', { className: 'grid grid-cols-2 sm:grid-cols-3 gap-3' },
                    (cliType === 'claude-code' ? [
                      { id: 'zai', label: 'Z.AI (GLM)', icon: 'Zap' },
                      { id: 'minimax', label: 'MiniMax', icon: 'Cpu' },
                      { id: 'kimi', label: 'Kimi', icon: 'Moon' },
                      { id: 'openrouter', label: 'OpenRouter', icon: 'Globe' },
                      { id: 'alibaba', label: 'Alibaba Coding', icon: 'Cloud' },
                      { id: 'piramyd', label: 'Piramyd Cloud', icon: 'Cloudy' },
                      { id: 'cerebras', label: 'Cerebras', icon: 'Cpu' }
                    ] : (cliType === 'opencode' || cliType === 'opencode-go') ? [
                      { id: 'anthropic', label: 'Anthropic', icon: 'Bot' },
                      { id: 'openai', label: 'OpenAI', icon: 'Sparkles' },
                      { id: 'google', label: 'Google', icon: 'Square' },
                      { id: 'opencode', label: 'OpenCode Zen', icon: 'Code' },
                      { id: 'openrouter', label: 'OpenRouter', icon: 'Globe' },
                      { id: 'minimax', label: 'MiniMax', icon: 'Cpu' },
                      { id: 'zai', label: 'Z.AI', icon: 'Zap' },
                      { id: 'kimi', label: 'Kimi', icon: 'Moon' },
                      { id: 'alibaba', label: 'Alibaba', icon: 'Cloud' },
                      { id: 'piramyd', label: 'Piramyd', icon: 'Cloudy' },
                      { id: 'cerebras', label: 'Cerebras', icon: 'Cpu' }
                    ] : []).map(p => React.createElement('button', {
                      key: p.id,
                      onClick: () => {
                        setProvider(p.id);
                        setModelName('');
                        setModelFilter('');
                        // Load saved API key for this provider
                        (async () => {
                          const res = await window.ccswitch.getCredential(p.id)
                          if (res && res.ok && typeof res.apiKey === 'string' && res.apiKey.trim().length > 0) {
                            setApiKey(res.apiKey)
                            setHasApiKey(true)
                          } else {
                            setApiKey('')
                            setHasApiKey(false)
                          }
                        })()
                      },
                      className: `flex items-center gap-2 px-4 py-3 rounded-xl border-2 transition-all ${provider === p.id
                        ? 'border-blue-500 bg-blue-50/50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400'
                        : 'border-zinc-100 dark:border-zinc-800 hover:border-zinc-200 dark:hover:border-zinc-700'}`
                    }, [React.createElement(Icon, { name: p.icon.toLowerCase(), size: 18, theme }), React.createElement('span', { className: 'font-medium' }, p.label)]))
                  )
                ]),

                // 3. API Key
                provider && React.createElement('div', null, [
                  React.createElement('label', { className: 'block text-xs font-medium text-zinc-500 mb-2' }, '3. API KEY'),
                  React.createElement('div', { className: 'relative' }, [
                    React.createElement('input', {
                      type: 'text',
                      value: apiKey,
                      onChange: e => {
                        const val = e.target.value
                        setApiKey(val)
                        setHasApiKey(val.trim().length > 0)
                      },
                      onBlur: persistApiKey,
                      className: 'w-full pl-4 pr-4 py-3 rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-mono text-sm',
                      placeholder: 'sk-...'
                    })
                  ])
                ]),

                // 4. Model Name (only shown after API key)
                hasApiKey && React.createElement('div', null, [
                  React.createElement('label', { className: 'block text-xs font-medium text-zinc-500 mb-2' }, '4. MODELO'),
                  React.createElement('div', { className: 'space-y-3' }, [
                    // Model input
                    React.createElement('input', {
                      value: modelName,
                      onChange: e => setModelName(e.target.value),
                      className: 'w-full px-4 py-3 rounded-xl bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium',
                      placeholder: provider === 'zai' || provider === 'openrouter' || provider === 'piramyd' ? 'Digite ou selecione um modelo...' : 'Nome do modelo...'
                    }),
                    // Filter input for providers with dynamic models
                    (provider === 'zai' || provider === 'openrouter' || provider === 'piramyd')
                      ? React.createElement('div', null, [
                          React.createElement('input', {
                            value: modelFilter,
                            onChange: e => setModelFilter(e.target.value),
                            className: 'w-full px-4 py-2 rounded-lg bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm',
                            placeholder: 'Filtrar modelos...'
                          }),
                          modelsLoading && React.createElement('div', { className: 'text-xs text-zinc-500 flex items-center gap-2' }, [
                            React.createElement('span', { className: 'w-3 h-3 border-2 border-zinc-400 border-t-blue-500 rounded-full animate-spin' }),
                            'Carregando modelos...'
                          ]),
                          modelsError && React.createElement('div', { className: 'text-xs text-red-500' }, modelsError)
                        ])
                      : null,
                    // Model list for providers with API
                    (provider === 'zai' || provider === 'openrouter' || provider === 'piramyd') && availableModels.length > 0
                      ? React.createElement('div', { className: 'flex flex-wrap gap-2 max-h-48 overflow-auto' },
                          availableModels
                            .filter(m => !modelFilter || m.toLowerCase().includes(modelFilter.toLowerCase()))
                            .slice(0, 100)
                            .map(id => React.createElement('button', {
                              key: id,
                              onClick: () => setModelName(id),
                              className: `text-[10px] px-2 py-1 rounded-md border ${modelName === id
                                ? 'bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-transparent'
                                : 'border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:border-zinc-300 dark:hover:border-zinc-700 transition-all'}`
                            }, id))
                        )
                      : null,
                    // Presets for providers without dynamic models
                    !(provider === 'zai' || provider === 'openrouter' || provider === 'piramyd') && PRESETS[provider]
                      ? React.createElement('div', { className: 'flex flex-wrap gap-2' }, PRESETS[provider].map(preset => React.createElement('button', {
                          key: preset.value,
                          onClick: () => setModelName(preset.value),
                          className: `text-[10px] px-2 py-1 rounded-md border ${modelName === preset.value
                            ? 'bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 border-transparent'
                            : 'border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:border-zinc-300 dark:hover:border-zinc-700 transition-all'}`
                        }, preset.name)))
                      : null
                  ])
                ])
              ]),

              // Save Button
              React.createElement('button', {
                disabled: !rootPath || !cliType || !hasApiKey || !provider || !modelName || saving,
                onClick: onSave,
                className: `w-full py-3 sm:py-4 rounded-2xl font-bold text-white shadow-lg transition-all flex items-center justify-center gap-2 ${!rootPath || !cliType || !hasApiKey || !provider || !modelName || saving
                  ? 'bg-zinc-300 dark:bg-zinc-800 cursor-not-allowed opacity-50'
                  : 'bg-blue-600 hover:bg-blue-700 hover:-translate-y-0.5 active:translate-y-0 shadow-blue-500/20'}`
              }, [
                saving ? React.createElement(Icon, { name: 'loader-2', className: 'animate-spin', theme }) : React.createElement(Icon, { name: 'save', theme }),
                saving ? 'Salvando...' : `Gerar ${cliType === 'claude-code' ? '.claude/settings.json' : 'opencode.json'}`
              ]),

              // Status Feedback
              status && React.createElement('div', {
                className: `p-3 sm:p-4 rounded-xl border flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 animate-in fade-in slide-in-from-top-2 duration-300 ${status.ok 
                  ? 'bg-green-50 dark:bg-green-500/10 border-green-200 dark:border-green-500/20 text-green-700 dark:text-green-400' 
                  : 'bg-red-50 dark:bg-red-500/10 border-red-200 dark:border-red-500/20 text-red-700 dark:text-red-400'}`
              }, [
                React.createElement('div', { className: 'flex gap-3' }, [
                  React.createElement(Icon, { name: status.ok ? 'check-circle' : 'alert-circle', className: 'mt-0.5 shrink-0', theme }),
                  React.createElement('div', null, [
                    React.createElement('p', { className: 'font-semibold text-sm' }, status.ok ? 'Sucesso!' : 'Erro ao salvar'),
                    React.createElement('p', { className: 'text-xs opacity-90' }, status.ok ? status.message : status.error)
                  ])
                ]),
                status.ok && React.createElement('button', {
                  onClick: openProjectFolder,
                  className: 'shrink-0 p-2 hover:bg-green-100 dark:hover:bg-green-500/20 rounded-lg transition-all text-green-700 dark:text-green-400 flex items-center gap-1.5 text-xs font-bold'
                }, [React.createElement(Icon, { name: 'external-link', size: 14, theme }), 'Abrir Pasta'])
              ])
            ]),

            // Right Column: Preview
            React.createElement('div', { className: 'lg:col-span-5 preview-column' }, [
              React.createElement('div', { className: 'sticky top-24 lg:top-24' }, [
                React.createElement('div', { className: 'bg-zinc-900 dark:bg-black rounded-2xl overflow-hidden border border-zinc-800 shadow-2xl' }, [
                  // Preview Header
                  React.createElement('div', { className: 'bg-zinc-800/50 px-4 py-3 border-b border-zinc-800 flex items-center justify-between' }, [
                    React.createElement('div', { className: 'flex items-center gap-2' }, [
                      React.createElement('div', { className: 'flex gap-1.5' }, [
                        React.createElement('div', { className: 'w-2.5 h-2.5 rounded-full bg-red-500' }),
                        React.createElement('div', { className: 'w-2.5 h-2.5 rounded-full bg-yellow-500' }),
                        React.createElement('div', { className: 'w-2.5 h-2.5 rounded-full bg-green-500' })
                      ]),
                      React.createElement('span', { className: 'text-[11px] font-mono text-zinc-400 ml-2 uppercase tracking-widest' }, 
                        cliType === 'claude-code' ? 'Preview: .claude/settings.json' : 'Preview: opencode.json'
                      )
                    ]),
                    React.createElement(Icon, { name: 'code', size: 14, className: 'text-zinc-500', theme })
                  ]),
                  // Preview Body
                  React.createElement('div', { className: 'p-4 sm:p-6' }, [
                    React.createElement('pre', { className: 'text-[11px] sm:text-[12px] font-mono text-blue-400 leading-relaxed overflow-x-auto' },
                      jsonPreview.split('\n').map((line, i) => React.createElement('div', { key: i, className: 'flex gap-4' }, [
                        React.createElement('span', { className: 'text-zinc-700 text-right w-4 shrink-0' }, i + 1),
                        React.createElement('span', { className: line.includes('ANTHROPIC_') ? 'text-blue-300' : line.includes('••••') ? 'text-zinc-600' : line.includes('$schema') ? 'text-purple-300' : 'text-zinc-300' }, line)
                      ]))
                    )
                  ])
                ]),
                // Tips
                React.createElement('div', { className: 'mt-4 sm:mt-6 p-3 sm:p-4 rounded-xl border border-zinc-200 dark:border-zinc-800 text-zinc-500 dark:text-zinc-400 space-y-2 sm:space-y-3' }, [
                  React.createElement('h3', { className: 'text-xs font-bold uppercase tracking-widest flex items-center gap-2' }, [
                    React.createElement(Icon, { name: 'lightbulb', size: 14, className: 'text-yellow-500', theme }), 'Dicas'
                  ]),
                  React.createElement('ul', { className: 'text-[10px] sm:text-[11px] space-y-1.5 sm:space-y-2 leading-relaxed' }, 
                    cliType === 'claude-code' ? [
                      '• A pasta .claude será criada automaticamente se não existir.',
                      '• O Claude Code lê as variáveis do campo "env" no arquivo settings.json.',
                      '• Variáveis de ambiente reais (export ...) têm prioridade sobre este arquivo.'
                    ] : [
                      '• O arquivo opencode.json será criado na raiz do projeto.',
                      '• Use /connect no OpenCode para gerenciar credenciais.',
                      '• O formato do modelo é provider_id/model_id.',
                      '• Consulte models.dev para todos os provedores disponíveis.',
                      '• OpenCode Go usa o mesmo formato de configuração do OpenCode (Node.js).'
                    ]
                  )
                ])
              ])
            ])
          ])
        ])
      }

      const root = ReactDOM.createRoot(document.getElementById('root'))
      root.render(React.createElement(App))
      
      // Inicializar Lucide após render
      window.addEventListener('load', () => {
        if (window.lucide) lucide.createIcons()
      })
    </script>
  </body>
</html>
